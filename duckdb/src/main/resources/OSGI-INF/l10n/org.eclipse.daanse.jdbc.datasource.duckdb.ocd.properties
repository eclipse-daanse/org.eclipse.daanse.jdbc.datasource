# DuckDB JDBC DataSource Configuration Localization

# OCD Names and Descriptions
ocd.ds.name=DuckDB DataSource Configuration
ocd.ds.description=Configuration for DuckDB DataSource component (embedded database)

# Property Names and Descriptions
databaseName.name=Database Name
databaseName.description=File path of the database for a persistent database, or empty / :memory: for an in-memory database (a DuckDB in-memory database is private to each connection)

readOnly.name=Read Only
readOnly.description=Open the database in read-only mode (file databases only)
